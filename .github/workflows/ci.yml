name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Install API dependencies
        run: npm ci --prefix server

      - name: Test and build API
        run: |
          npm test --prefix server
          npm run build --prefix server

      - name: Configure test API endpoint
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL || 'http://127.0.0.1:3000/api/v1' }}" >> .env

      - name: Build
        run: npm run build
