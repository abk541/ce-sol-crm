name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── 1. Test + Build ──────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Vite reads VITE_* directly from process.env at build time —
      # no .env file needed. Fallback to legacy secret names if present.
      - name: Build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
          VITE_SAM_GOV_API_KEY:   ${{ secrets.VITE_SAM_GOV_API_KEY || secrets.SAM_GOV_API_KEY }}
        run: |
          # Fail loudly if the SAM.gov key didn't reach the build environment,
          # rather than silently shipping a broken bundle.
          if [ -z "$VITE_SAM_GOV_API_KEY" ]; then
            echo "::error::VITE_SAM_GOV_API_KEY is empty — check repo Settings → Secrets → Actions."
            exit 1
          fi
          echo "VITE_SAM_GOV_API_KEY present (length=${#VITE_SAM_GOV_API_KEY})"
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ── 2. Deploy to GitHub Pages (main branch only) ─────────────────────
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
