name: Diagnose Hostinger document root

on:
  workflow_dispatch:

jobs:
  locate-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Normalize FTP host
        id: ftphost
        shell: bash
        run: |
          host="${{ secrets.HOSTINGER_FTP_HOST }}"
          host="${host#ftp://}"
          host="${host#ftps://}"
          host="${host#sftp://}"
          host="${host%/}"
          echo "::add-mask::$host"
          echo "server=$host" >> "$GITHUB_OUTPUT"

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Locate public and newly deployed app assets
        env:
          FTP_HOST: ${{ steps.ftphost.outputs.server }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        shell: bash
        run: |
          listing="$(lftp -c "
          set ftp:ssl-force true;
          set ftp:ssl-protect-data true;
          set ssl:verify-certificate false;
          set ftp:passive-mode true;
          set net:timeout 20;
          set net:max-retries 3;
          set cmd:fail-exit true;
          open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
          find -d 8 /;
          bye;
          ")"

          matches="$(printf '%s\n' "$listing" | grep -E '(^|/)(index\.html|assets/index-[A-Za-z0-9_-]+\.js)$' || true)"
          if [ -z "$matches" ]; then
            echo 'No application index or hashed JavaScript assets were found.' >&2
            exit 1
          fi
          printf '%s\n' "$matches"
