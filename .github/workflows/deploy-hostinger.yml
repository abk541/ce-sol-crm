name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate API endpoint
        shell: bash
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          case "$VITE_API_URL" in
            https://*/api/v1) ;;
            *) echo 'VITE_API_URL must be an HTTPS URL ending in /api/v1.' >&2; exit 1 ;;
          esac

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # Strip any ftp:// / ftps:// / sftp:// scheme from the host secret so the
      # FTP action gets a bare hostname or IP (basic-ftp under the hood rejects
      # URI-style values).
      - name: Normalize FTP host
        id: ftphost
        shell: bash
        run: |
          host="${{ secrets.HOSTINGER_FTP_HOST }}"
          host="${host#ftp://}"
          host="${host#ftps://}"
          host="${host#sftp://}"
          host="${host%/}"
          echo "::add-mask::$host"
          echo "server=$host" >> "$GITHUB_OUTPUT"

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      # SamKirkland/FTP-Deploy-Action hangs indefinitely against Hostinger
      # (basic-ftp under the hood waits forever on the passive-mode data
      # channel). lftp is proven, prints every transfer live, and dies fast
      # on real failures.
      - name: Deploy dist/ to Hostinger via lftp (FTPS)
        env:
          FTP_HOST: ${{ steps.ftphost.outputs.server }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_PATH: ${{ secrets.HOSTINGER_FTP_PATH }}
        run: |
          lftp -c "
          set ftp:ssl-force true;
          set ftp:ssl-protect-data true;
          set ssl:verify-certificate false;
          set ftp:passive-mode true;
          set net:timeout 20;
          set net:max-retries 3;
          set net:reconnect-interval-base 5;
          set cmd:fail-exit true;
          open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
          mirror -R --verbose --parallel=4 --exclude-glob .ftp-deploy-sync-state.json ./dist/ '$FTP_PATH';
          put -O '$FTP_PATH' ./dist/.htaccess;
          bye;
          "

      - name: Verify the public CRM serves this build
        shell: bash
        env:
          EXPECTED_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          set -euo pipefail
          if [ -z "$EXPECTED_API_URL" ]; then
            echo 'VITE_API_URL must be configured for the production deployment.' >&2
            exit 1
          fi
          expected_api_host="$(printf '%s' "$EXPECTED_API_URL" | sed -E 's#^https?://([^/]+).*$#\1#')"
          expected_js="$(find dist/assets -maxdepth 1 -type f -name 'index-*.js' -printf '%f\n' | head -n 1)"
          if [ -z "$expected_js" ]; then
            echo 'The build produced no hashed application JavaScript file.' >&2
            exit 1
          fi

          public_js=''
          for attempt in {1..6}; do
            html="$(curl -fsSL -H 'Cache-Control: no-cache' "https://crm.cesolutionplus.com/?release=${GITHUB_SHA}-${attempt}" || true)"
            public_js="$(printf '%s\n' "$html" | grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' | head -n 1 || true)"
            if [ "$public_js" = "assets/$expected_js" ]; then
              curl -fsSL -H 'Cache-Control: no-cache' \
                "https://crm.cesolutionplus.com/${public_js}?release=${GITHUB_SHA}-${attempt}" \
                -o /tmp/public-crm.js
              canonical_headers="$(curl -sSI -H 'Cache-Control: no-cache' \
                "https://www.crm.cesolutionplus.com/?release=${GITHUB_SHA}-${attempt}" || true)"
              canonical_status="$(printf '%s\n' "$canonical_headers" \
                | awk '/^HTTP\// { status=$2 } END { print status }')"
              canonical_location="$(printf '%s\n' "$canonical_headers" \
                | tr -d '\r' | sed -n 's/^[Ll]ocation: //p' | tail -n 1)"
              index_cache="$(curl -sSI -H 'Cache-Control: no-cache' \
                "https://crm.cesolutionplus.com/?release=${GITHUB_SHA}-${attempt}" \
                | tr -d '\r' | grep -i '^cache-control:' | tail -n 1 || true)"
              if grep -Fq "$expected_api_host" /tmp/public-crm.js \
                && ! grep -Fq 'supabase.co' /tmp/public-crm.js \
                && ! grep -Fq '/rest/v1' /tmp/public-crm.js \
                && ! grep -Fq '/auth/v1' /tmp/public-crm.js \
                && ! grep -Fq 'api.sam.gov' /tmp/public-crm.js \
                && ! grep -Fq 'VITE_SAM_GOV_API_KEY' /tmp/public-crm.js \
                && [ "$canonical_status" = '301' ] \
                && [[ "$canonical_location" == https://crm.cesolutionplus.com/* ]] \
                && [[ "$index_cache" == *no-store*must-revalidate* ]]; then
                echo "Verified public release asset: $public_js"
                exit 0
              fi
            fi
            sleep 10
          done

          echo "Expected public asset assets/$expected_js, received ${public_js:-none}." >&2
          exit 1
