name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}

      # Strip any ftp:// / ftps:// / sftp:// scheme from the host secret so the
      # FTP action gets a bare hostname or IP (basic-ftp under the hood rejects
      # URI-style values).
      - name: Normalize FTP host
        id: ftphost
        shell: bash
        run: |
          host="${{ secrets.HOSTINGER_FTP_HOST }}"
          host="${host#ftp://}"
          host="${host#ftps://}"
          host="${host#sftp://}"
          host="${host%/}"
          echo "::add-mask::$host"
          echo "server=$host" >> "$GITHUB_OUTPUT"

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      # SamKirkland/FTP-Deploy-Action hangs indefinitely against Hostinger
      # (basic-ftp under the hood waits forever on the passive-mode data
      # channel). lftp is proven, prints every transfer live, and dies fast
      # on real failures.
      - name: Deploy dist/ to Hostinger via lftp (FTPS)
        env:
          FTP_HOST: ${{ steps.ftphost.outputs.server }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_PATH: ${{ secrets.HOSTINGER_FTP_PATH }}
        run: |
          lftp -c "
          set ftp:ssl-force true;
          set ftp:ssl-protect-data true;
          set ssl:verify-certificate false;
          set ftp:passive-mode true;
          set net:timeout 20;
          set net:max-retries 3;
          set net:reconnect-interval-base 5;
          set cmd:fail-exit true;
          open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
          mirror -R --verbose --parallel=4 --exclude-glob .ftp-deploy-sync-state.json ./dist/ '$FTP_PATH';
          bye;
          "
